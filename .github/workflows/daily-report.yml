name: Daily SNS Performance Report

on:
  schedule:
    # 한국시간 오전 9시(UTC 0시), 오후 3시(UTC 6시), 오후 9시(UTC 12시) - 하루 3회
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
  push:
    branches: [main]  # 코드 push 시 자동 실행
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write
  pages: write

jobs:
  collect-and-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        run: |
          cat > .env << 'ENVEOF'
          META_PAGE_ACCESS_TOKEN=${{ secrets.META_PAGE_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID=${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN=${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CHANNEL_ID=${{ secrets.YOUTUBE_CHANNEL_ID }}
          TIKTOK_CLIENT_KEY=${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET=${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_ACCESS_TOKEN=${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_REFRESH_TOKEN=${{ secrets.TIKTOK_REFRESH_TOKEN }}
          GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEETS_CLIENT_ID=${{ secrets.GOOGLE_SHEETS_CLIENT_ID }}
          GOOGLE_SHEETS_CLIENT_SECRET=${{ secrets.GOOGLE_SHEETS_CLIENT_SECRET }}
          GOOGLE_SHEETS_REFRESH_TOKEN=${{ secrets.GOOGLE_SHEETS_REFRESH_TOKEN }}
          SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          POST_MAX_AGE_DAYS=90
          ENVEOF

      - name: Run SNS Performance Report
        run: python main.py

      - name: Prepare GitHub Pages
        run: |
          mkdir -p docs
          # 오늘 보고서를 index.html로 복사 (최신 보고서)
          LATEST=$(ls -t reports/*.html 2>/dev/null | head -1)
          if [ -n "$LATEST" ]; then
            cp "$LATEST" docs/index.html
            cp reports/*.html docs/
          fi
          # TikTok 도메인 인증 파일 복사
          cp tiktokcxgdO5gKkR8iXROaQljrvic7xYJc678o.txt docs/ 2>/dev/null || true
          # 빌드 시각 표시 (캐시 무효화 + 사용자에게 마지막 업데이트 시간 표시)
          BUILD_TIME=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M:%S KST')
          sed -i "s|<title>|<!-- Build: $BUILD_TIME -->\n<title>|" docs/index.html
          # 헤더 부제목에 마지막 업데이트 시각 추가
          sed -i "s|자동 생성 리포트|자동 생성 리포트 · 마지막 업데이트: $BUILD_TIME|" docs/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
